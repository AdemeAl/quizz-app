<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" type="image/x-icon" href="/logo.png" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=check,close"
    />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="./src/style.css" />
    <title>QuizMaster - Jeu</title>
  </head>
  <body>
    <main class="quiz-container">
      <div class="top-bar">
        <div class="top-bar-infos">
          <p id="demo">1:00</p>
          <button
            id="quit-btn"
            style="
              background: none;
              border: none;
              cursor: pointer;
              font-size: 1.2em;
            "
          >
            <i class="fa-solid fa-right-from-bracket"></i>
          </button>
          <i
            id="speech-btn"
            style="font-size: 1.2em; cursor: pointer"
            class="fa-solid fa-volume-low"
          ></i>
        </div>
        <div class="progress-bar">
          <div class="bar"></div>
        </div>
        <div class="score">
          <span id="questions-lvl">0/0</span>
          <div class="incorrect">
            <span class="material-symbols-outlined">close</span>
            <span id="incorrect-score">0</span>
          </div>
          <div class="correct">
            <span class="material-symbols-outlined">check</span>
            <span id="correct-score">0</span>
          </div>
        </div>
      </div>

      <div class="quiz">
        <h2 id="question">Chargement...</h2>
        <div id="answer-buttons"></div>
        <button class="next-button disabled" disabled>Suivant</button>
      </div>

      <section id="score-section">
        <h1 id="quiz-remark"></h1>
        <div class="results-display">
          <div class="score-display">
            <h3>Score</h3>
            <span id="score-span"></span>
          </div>
          <div class="analyse-section">
            <img
              src="https://www.gstatic.com/lamda/images/immersives/strength-growth-areas-large_d64b831ecd41c6be77dc1.svg"
              alt=""
            />
            <div class="analyse-text">
              <h4>Analyse IA</h4>
              <p>Découvrez vos points forts grâce à l'IA.</p>
            </div>
            <button id="analyse-btn" class="analyse-btn">
              Analyser mon quiz
            </button>
          </div>
        </div>
        <p id="analysis-text"></p>
        <div class="end-links">
          <a id="share-btn" href="#">
            <span>Partager le quiz</span>
          </a>
          <button class="home-button">
            <a href="./landing-page/index.html"></a>Retour au menu
          </button>
        </div>
      </section>
    </main>

    <div
      id="quit-modal"
      style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        display: none;
      "
    >
      <div
        style="
          background: white;
          padding: 30px;
          border-radius: 10px;
          text-align: center;
          box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        "
      >
        <h2>Quitter le quiz ?</h2>
        <p>Êtes-vous sûr ? Votre progression sera perdue.</p>
        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
          "
        >
          <button
            id="cancel-btn"
            style="
              padding: 10px 20px;
              background: #ccc;
              border: none;
              border-radius: 5px;
              cursor: pointer;
            "
          >
            Annuler
          </button>
          <button
            id="confirm-quit-btn"
            style="
              padding: 10px 20px;
              background: #ff4444;
              color: white;
              border: none;
              border-radius: 5px;
              cursor: pointer;
            "
          >
            Quitter
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="./src/script.js"></script>
  </body>
</html>
